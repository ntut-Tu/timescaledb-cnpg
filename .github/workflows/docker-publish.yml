name: Build and Publish CNPG Custom Image

on:
  push:
    branches:
      - releases
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SCAN_TAG: v.${{ github.run_number }}

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.SCAN_TAG }}

      - name: Build Docker image (local only, for security scan)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Run Trivy vulnerability scan (report only)
        run: |
          set -euo pipefail
          RAW_IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SCAN_TAG }}"
          LOWERCASE_IMAGE=$(echo "$RAW_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          TRIVY_REPORT="$(mktemp)"

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.57.1 \
            image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            "$LOWERCASE_IMAGE" | tee "$TRIVY_REPORT"

          {
            echo "## Trivy scan result (HIGH/CRITICAL)"
            echo ""
            echo "Image: \`$LOWERCASE_IMAGE\`"
            echo ""
            echo '```text'
            cat "$TRIVY_REPORT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push Docker image (after successful scan)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
